<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Predictor</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:#f4f4f4;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
        }

        .card{

            width:350px;
            background:white;

            padding:30px;

            border-radius:15px;

            box-shadow:0 0 15px rgba(0,0,0,0.2);

            text-align:center;
        }

        h1{
            color:#333;
        }

        input{

            width:90%;
            padding:12px;

            margin-top:20px;

            border:1px solid gray;

            border-radius:8px;

            font-size:16px;
        }

        button{

            margin-top:20px;

            padding:12px 25px;

            border:none;

            background:#007BFF;

            color:white;

            border-radius:8px;

            cursor:pointer;

            font-size:16px;
        }

        button:hover{
            background:#0056b3;
        }

        #result{

            margin-top:20px;

            font-size:20px;

            font-weight:bold;

            color:green;
        }

    </style>

</head>

<body>

    <div class="card">

        <h1>Salary Predictor</h1>

        <input
            type="number"
            id="experience"
            placeholder="Enter Years Of Experience"
        >

        <br>

        <button onclick="predictSalary()">
            Predict Salary
        </button>

        <div id="result"></div>

    </div>

    <script>

        async function predictSalary(){

            const exp =
                document.getElementById("experience").value;

            try{

                const response = await fetch(
                    "http://127.0.0.1:8000/predict",
                    {

                        method:"POST",

                        headers:{
                            "Content-Type":"application/json"
                        },

                        body:JSON.stringify({
                            experience:parseFloat(exp)
                        })
                    }
                );

                const data = await response.json();

                document.getElementById("result").innerHTML =
                    "Predicted Salary: ₹ " +
                    data.predicted_salary.toFixed(2);

            }

            catch(error){

                console.log(error);

                document.getElementById("result").innerHTML =
                    "❌ Backend Error";
            }

        }

    </script>

</body>

</html>
